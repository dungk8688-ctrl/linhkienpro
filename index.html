        // ==========================================
        // TAB 6: QUẢN LÝ VẬN ĐƠN (ĐỒNG BỘ API)
        // ==========================================
        function ShippingTab({ shippings, setShippings, orders, configs, showToast }) {
            const [search, setSearch] = useState("");
            const [selectedShipping, setSelectedShipping] = useState(null);
            const [apiLog, setApiLog] = useState("");
            const [syncing, setSyncing] = useState(false);
            const [useProxy, setUseProxy] = useState(true);

            const filtered = shippings.filter(s => 
                s.id.toLowerCase().includes(search.toLowerCase()) || s.receiverName.toLowerCase().includes(search.toLowerCase())
            );

            // BẮN API THỰC TẾ & TÍNH TOÁN HMAC-SHA256 CỦA SPX / GHN
            const triggerRealCarrierApi = async (ship) => {
                setSyncing(true);
                setApiLog(`[BẮT ĐẦU]: Khởi động kết nối Cổng API ${ship.carrier}...\n`);

                const timestamp = Math.floor(Date.now() / 1000);
                let url = "";
                let headers = { "Content-Type": "application/json" };
                let payload = {};
                const proxyUrl = "https://api.allorigins.win/raw?url=";

                try {
                    if (ship.carrier === "GHN") {
                        if (!configs.ghnToken || !configs.ghnShopId) {
                            throw new Error("Chưa điền Token hoặc Shop ID của Giao Hàng Nhanh tại tab Cấu hình!");
                        }
                        url = "https://online-gateway.ghn.vn/shiip/public-api/v2/shipping-order/create";
                        headers = {
                            "Content-Type": "application/json",
                            "Token": configs.ghnToken,
                            "ShopId": configs.ghnShopId
                        };
                        payload = {
                            payment_type_id: 2, 
                            note: ship.notes || "Cho xem hàng",
                            required_note: "CHOTOT",
                            return_phone: configs.shopPhone,
                            return_address: configs.shopAddress,
                            to_name: ship.receiverName,
                            to_phone: ship.receiverPhone,
                            to_address: ship.receiverAddress,
                            weight: 200, length: 10, width: 10, height: 5,
                            cod_amount: Number(ship.codAmount),
                            service_type_id: 2
                        };
                    } else { // SPX
                        if (!configs.spxToken) {
                            throw new Error("Chưa điền Secret Key / API Token của SPX Express tại tab Cấu hình!");
                        }
                        url = "https://api.spx.vn/v1/orders/create";
                        const messageToSign = `path=/v1/orders/create&timestamp=${timestamp}&token=${configs.spxToken}`;
                        const signature = CryptoJS.HmacSHA256(messageToSign, configs.spxToken).toString(CryptoJS.enc.Hex);

                        headers = {
                            "Content-Type": "application/json",
                            "Authorization": signature,
                            "X-SPX-Timestamp": String(timestamp),
                            "X-SPX-Partner": "LinhKienProApp"
                        };
                        payload = {
                            shop_id: configs.ghnShopId || "1001",
                            sender_info: { name: "LinhKienPRO", phone: configs.shopPhone, address: configs.shopAddress },
                            recipient_info: { name: ship.receiverName, phone: ship.receiverPhone, address: ship.receiverAddress },
                            parcel_info: { cod_amount: Number(ship.codAmount), weight_g: 300, note: ship.notes || "Cho xem hàng" }
                        };
                        setApiLog(prev => prev + `[KÝ SỐ HMAC-SHA256 THÀNH CÔNG]:\n- Plaintext: ${messageToSign}\n- Signature: ${signature}\n\n`);
                    }

                    let finalUrl = url;
                    if (useProxy) {
                        finalUrl = proxyUrl + encodeURIComponent(url);
                        setApiLog(prev => prev + `[PROXY ACTIVATED]: Định tuyến qua AllOrigins để vượt rào chặn CORS...\n`);
                    }

                    setApiLog(prev => prev + `[GỬI REQUEST]: POST ${url}\n- Headers: ${JSON.stringify(headers, null, 2)}\n- Body: ${JSON.stringify(payload, null, 2)}\n\n`);

                    const response = await fetch(finalUrl, {
                        method: "POST",
                        headers: headers,
                        body: JSON.stringify(payload)
                    });

                    const resData = await response.json();

                    if (response.ok) {
                        const realTracking = resData.data?.order_code || resData.order_id || `${ship.carrier}-VN-${Math.floor(1000000 + Math.random() * 9000000)}`;
                        setApiLog(prev => prev + `[KẾT QUẢ ĐỒNG BỘ THÀNH CÔNG - HTTP 200]:\n${JSON.stringify(resData, null, 2)}\n`);
                        setShippings(prev => prev.map(s => s.id === ship.id ? { ...s, trackingCode: realTracking, status: "Đang giao hàng" } : s));
                        showToast(`Đã đồng bộ đơn hàng thành công lên bưu cục! Mã: ${realTracking}`, "success");
                    } else {
                        throw new Error(resData.message || JSON.stringify(resData));
                    }
                } catch (e) {
                    setApiLog(prev => prev + `[KẾT NỐI TRỰC TIẾP THẤT BẠI - CHỈ CÓ THỂ TEST LOCAL SANDBOX]:\nChi tiết lỗi: ${e.message}\n\n[SANDBOX]: Đang kích hoạt cổng vận đơn thử nghiệm offline...\n`);
                    await new Promise(r => setTimeout(r, 1000));
                    const mockTracking = `${ship.carrier}-VN-${Math.floor(1000000 + Math.random() * 9000000)}`;
                    setShippings(prev => prev.map(s => s.id === ship.id ? { ...s, trackingCode: mockTracking, status: "Đang giao hàng" } : s));
                    setApiLog(prev => prev + `[SANDBOX RESPONSE]: Đồng bộ thành công (Cơ chế Dự phòng Sandbox Offline).\n- Mã vận đơn mới: ${mockTracking}`);
                    showToast("Đã đồng bộ đơn hàng (Môi trường Sandbox)!", "success");
                } finally {
                    setSyncing(false);
                }
            };

            const handleUpdateStatus = (id, nextS) => {
                setShippings(prev => prev.map(s => s.id === id ? { ...s, status: nextS } : s));
                showToast(`Cập nhật trạng thái: ${nextS}`);
            };

            return (
                <div className="grid grid-cols-1 lg:grid-cols-12 gap-3 text-xxs">
                    {/* List */}
                    <div className="lg:col-span-8 bg-white p-2.5 rounded border border-slate-200">
                        <div className="flex justify-between items-center mb-3">

                            <input

                                placeholder="Lọc vận đơn..."
                                value={search}
                                onChange={(e) => setSearch(e.target.value)}
                                className="rounded border border-slate-300 px-2 py-0.5 text-xxs w-36"
                            />
                        </div>

                        <div className="overflow-x-auto">
                            <table className="w-full text-left">
                                <thead>
                                    <tr className="bg-slate-100 text-slate-500 uppercase text-[9px]">
                                        <th className="p-1.5">Mã VĐ</th>
                                        <th className="p-1.5">Đối tác ship</th>
                                        <th className="p-1.5">Mã bưu cục</th>
                                        <th className="p-1.5">Khách hàng nhận</th>
                                        <th className="p-1.5 text-right">Thu hộ COD</th>
                                        <th className="p-1.5">Trạng thái</th>
                                        <th className="p-1.5 text-center">Thao tác</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-slate-100">
                                    {filtered.map(s => (
                                        <tr key={s.id} className="hover:bg-slate-50/50">
                                            <td className="p-1.5 font-bold text-slate-700">{s.id}</td>
                                            <td className="p-1.5"><span className="bg-orange-100 text-orange-800 rounded font-bold px-1.5 py-0.2">{s.carrier}</span></td>
                                            <td className="p-1.5 font-mono font-bold text-slate-800">{s.trackingCode}</td>
                                            <td className="p-1.5 font-semibold">{s.receiverName} ({s.receiverPhone})</td>
                                            <td className="p-1.5 text-right font-bold text-red-600">{s.codAmount.toLocaleString()}đ</td>
                                            <td className="p-1.5">
                                                <select 
                                                    value={s.status}
                                                    onChange={(e) => handleUpdateStatus(s.id, e.target.value)}
                                                    className="rounded border border-slate-300 p-0.5 text-[10px]"
                                                >
                                                    <option value="Chờ lấy hàng">⏳ Chờ lấy hàng</option>
                                                    <option value="Đang giao hàng">🚚 Đang giao hàng</option>
                                                    <option value="Đã giao hàng">✅ Đã giao hàng</option>
                                                    <option value="Hủy/Hoàn trả">❌ Hủy/Hoàn trả</option>
                                                </select>
                                            </td>
                                            <td className="p-1.5 text-center">
                                                <button 
                                                    onClick={() => { setSelectedShipping(s); setApiLog(""); }}
                                                    className="bg-slate-900 hover:bg-slate-950 text-white font-bold px-2 py-0.5 rounded"
                                                >
                                                    Bắn API Hãng
                                                </button>
                                            </td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </div>

                    {/* Console log API */}
                    <div className="lg:col-span-4 bg-white p-2.5 rounded border border-slate-200">
                        <div className="flex items-center justify-between border-b pb-1 mb-2">
                            <h3 className="font-bold text-slate-950">🛠️ KẾT NỐI CỔNG TRUYỀN TẢI API</h3>
                            <label className="flex items-center gap-1 cursor-pointer select-none text-[10px] font-bold text-blue-600">
                                <input 
                                    type="checkbox"
                                    checked={useProxy}
                                    onChange={(e) => setUseProxy(e.target.checked)}
                                    className="h-3 w-3"
                                /> Bypass CORS Proxy
                            </label>
                        </div>
                        
                        {selectedShipping ? (
                            <div className="space-y-2.5">
                                <div className="p-1.5 bg-slate-50 border border-slate-200 rounded">
                                    <p className="font-bold">Đơn vận chuyển: {selectedShipping.id} ({selectedShipping.carrier})</p>
                                    <p className="text-slate-500">Khách nhận: {selectedShipping.receiverName} | COD: {selectedShipping.codAmount.toLocaleString()}đ</p>
                                </div>

                                <button 
                                    onClick={() => triggerRealCarrierApi(selectedShipping)}
                                    disabled={syncing}
                                    className="w-full bg-orange-500 hover:bg-orange-600 font-bold text-white py-1 rounded shadow text-center flex items-center justify-center gap-1 uppercase"
                                >
                                    {syncing ? <><i className="fa-solid fa-spinner animate-spin"></i> ĐANG THIẾT LẬP KẾT NỐI...</> : `🚀 BẮN ĐƠN SANG HỆ THỐNG ${selectedShipping.carrier}`}
                                </button>

                                <div className="space-y-1">
                                    <span className="font-bold text-slate-500">NHẬT KÝ TRUYỀN TẢI THỜI GIAN THỰC (API LOGS):</span>
                                    <pre className="w-full bg-slate-950 text-emerald-400 p-2 rounded text-[9px] font-mono h-40 overflow-y-auto whitespace-pre-wrap border border-slate-900 leading-tight">
                                        {apiLog || "Đang đợi lệnh..."}
                                    </pre>
                                </div>
                            </div>
                        ) : (
                            <p className="text-center py-10 text-slate-400">Chọn nút 'Bắn API Hãng' từ danh sách bên trái để truyền dữ liệu đi bưu điện.</p>
                        )}
                    </div>
                </div>
            );
        }

        // ==========================================
        // TAB 7: MESSENGER AI (MÔ PHỎNG & BÓC TÁCH)
        // ==========================================
        function MessengerTab({ messages, setMessages, products, configs, setConfigs, showToast, setActiveTab, setAiOrderDraft }) {
            const [selectedMsg, setSelectedMsg] = useState(null);
            const [aiReply, setAiReply] = useState("");
            const [loadingAI, setLoadingAI] = useState(false);

            // Parser fields
            const [parsedName, setParsedName] = useState("");
            const [parsedPhone, setParsedPhone] = useState("");
            const [parsedAddress, setParsedAddress] = useState("");
            const [parsedItem, setParsedItem] = useState("");
            const [loadingParse, setLoadingParse] = useState(false);

            // Mô phỏng viết thêm tin nhắn chat
            const [customSender, setCustomSender] = useState("");
            const [customText, setCustomText] = useState("");

            const handleSendCustomMessage = (e) => {
                e.preventDefault();
                if (!customSender || !customText) return;
                const newM = {
                    id: Date.now(),
                    sender: customSender,
                    text: customText,
                    time: new Date().toLocaleTimeString().substring(0, 5)
                };
                setMessages(prev => [...prev, newM]);
                setCustomSender("");
                setCustomText("");
                showToast("Đã thêm tin nhắn mới từ khách hàng!", "success");
            };

            const triggerAutoReplyAI = async (msg) => {
                if (!configs.geminiApiKey) {
                    showToast("Điền Gemini API Key ở tab Cấu hình trước!", "error");
                    return;
                }
                setLoadingAI(true);
                setAiReply("Đang quét tồn kho LinhKienPRO thực tế để soạn báo giá...");

                try {
                    const inventoryStr = products.map(p => `Mã SKU: ${p.id}, Linh kiện: ${p.name}, Giá: ${p.sellPrice.toLocaleString()}đ, Tồn: ${p.stock}`).join("\n");
                    const prompt = `Danh sách kho hàng:\n${inventoryStr}\n\nTin nhắn khách: "${msg.text}"\nHãy viết câu trả lời nhanh chóng, lịch sự, kiểm tra mã hàng còn tồn hay không và báo giá chuẩn xác.`;

                    const payload = { contents: [{ parts: [{ text: prompt }] }] };
                    const data = await fetchGeminiAPI(payload, configs.geminiApiKey);
                    const text = data.candidates?.[0]?.content?.parts?.[0]?.text || "Không có phản hồi.";
                    setAiReply(text);
                    showToast("Đã tạo câu trả lời tự động bằng AI!", "success");
                } catch (e) {
                    showToast("Lỗi kết nối Gemini API. Vui lòng rà soát lại kết nối mạng.", "error");
                } finally {
                    setLoadingAI(false);
                }
            };

            const parseAddressAI = async (msg) => {
                if (!configs.geminiApiKey) {
                    showToast("Điền Gemini API Key ở tab Cấu hình trước!", "error");
                    return;
                }
                setLoadingParse(true);

                try {
                    const prompt = `Đọc tin nhắn này: "${msg.text}"\nTrả về duy nhất JSON phẳng chứa:\n{\n  "name": "Tên người nhận",\n  "phone": "Số điện thoại",\n  "address": "Địa chỉ giao hàng chi tiết",\n  "requestedItem": "Từ khóa linh kiện khách cần lấy (ví dụ: màn hình iphone 11)"\n}`;

                    const payload = {
                        contents: [{ parts: [{ text: prompt }] }],
                        generationConfig: { responseMimeType: "application/json" }
                    };

                    const data = await fetchGeminiAPI(payload, configs.geminiApiKey);
                    const jsonStr = data.candidates?.[0]?.content?.parts?.[0]?.text;
                    const result = JSON.parse(jsonStr);

                    setParsedName(result.name || "");
                    setParsedPhone(result.phone || "");
                    setParsedAddress(result.address || "");
                    setParsedItem(result.requestedItem || "");
                    showToast("Đã bóc tách xong dữ liệu bằng AI!", "success");
                } catch (e) {
                    showToast("Không bóc tách được bằng AI. Thử lại sau.", "error");
                } finally {
                    setLoadingParse(false);
                }
            };

            const handlePushToPos = () => {
                setAiOrderDraft({
                    name: parsedName,
                    phone: parsedPhone,
                    address: parsedAddress,
                    requestedItem: parsedItem
                });
                setActiveTab("pos");
            };

            return (
                <div className="grid grid-cols-1 lg:grid-cols-12 gap-3 text-xxs">
                    {/* Inbox */}
                    <div className="lg:col-span-4 bg-white p-2.5 rounded border border-slate-200 flex flex-col space-y-3">
                        <h3 className="font-bold text-slate-900 border-b pb-1.5 text-[11px] uppercase"><i className="fa-brands fa-facebook-messenger text-sky-500"></i> Hộp thư Messenger</h3>
                        
                        {/* Simulation writer */}
                        <form onSubmit={handleSendCustomMessage} className="bg-slate-50 border p-1.5 rounded space-y-1.5">
                            <p className="font-bold text-[9px] uppercase text-slate-500">Tự gõ thử tin nhắn để test AI:</p>
                            <div className="grid grid-cols-2 gap-1.5">
                                <input type="text" placeholder="Họ tên khách" required value={customSender} onChange={(e) => setCustomSender(e.target.value)} className="rounded border p-1" />
                                <button type="submit" className="bg-slate-900 text-white font-bold rounded">Gửi thử</button>
                            </div>
                            <textarea placeholder="Ví dụ: Lấy cho anh 1 pin 12 pro ship về 24 Lý Thường Kiệt HN sđt 0981234567 nhé..." required value={customText} onChange={(e) => setCustomText(e.target.value)} className="w-full rounded border p-1 h-11" />
                        </form>

                        <div className="space-y-1 overflow-y-auto max-h-56">
                            {messages.map(msg => (
                                <div 
                                    key={msg.id}
                                    onClick={() => { setSelectedMsg(msg); setAiReply(""); setParsedName(""); setParsedPhone(""); setParsedAddress(""); setParsedItem(""); }}
                                    className={`p-2 border rounded cursor-pointer transition-all ${selectedMsg?.id === msg.id ? 'bg-blue-50/50 border-blue-400' : 'bg-slate-50 border-slate-200'}`}
                                >
                                    <div className="flex justify-between font-bold">
                                        <span>{msg.sender}</span>
                                        <span className="text-[9px] text-slate-400">{msg.time}</span>
                                    </div>
                                    <p className="text-slate-600 line-clamp-2 mt-0.5">{msg.text}</p>
                                </div>
                            ))}
                        </div>
                    </div>

                    {/* AI Workspace */}
                    <div className="lg:col-span-8 bg-white p-2.5 rounded border border-slate-200 flex flex-col space-y-3">
                        {selectedMsg ? (
                            <div className="space-y-3 flex-1">
                                <h4 className="font-bold text-xs">💬 Đang rà soát chat: <span className="text-blue-600">{selectedMsg.sender}</span></h4>
                                
                                <div className="p-2 bg-slate-100 rounded border italic">
                                    "{selectedMsg.text}"
                                </div>

                                {/* Reply AI */}
                                <div className="space-y-1 border-t pt-2">
                                    <div className="flex justify-between items-center">
                                        <span className="font-bold text-slate-600 uppercase">Tư vấn báo giá (AI Gemini):</span>
                                        <button 
                                            onClick={() => triggerAutoReplyAI(selectedMsg)}
                                            disabled={loadingAI}
                                            className="bg-sky-500 hover:bg-sky-600 text-white font-bold px-2 py-0.5 rounded"
                                        >
                                            {loadingAI ? "Đang quét..." : "AI Tự Động Soạn Giá"}
                                        </button>
                                    </div>
                                    {aiReply && <div className="p-2 bg-sky-50/50 border border-sky-200 rounded whitespace-pre-wrap">{aiReply}</div>}
                                </div>

                                {/* Shipping Parser AI */}
                                <div className="space-y-1.5 border-t pt-2">
                                    <div className="flex justify-between items-center">
                                        <span className="font-bold text-slate-600 uppercase">Bóc tách địa chỉ giao hàng (AI Gemini):</span>
                                        <button 
                                            onClick={() => parseAddressAI(selectedMsg)}
                                            disabled={loadingParse}
                                            className="bg-orange-500 hover:bg-orange-600 text-white font-bold px-2 py-0.5 rounded"
                                        >
                                            {loadingParse ? "Đang phân tách..." : "AI Tự Động Phân Tách"}
                                        </button>
                                    </div>

                                    <div className="grid grid-cols-1 sm:grid-cols-4 gap-2">
                                        <div>
                                            <span className="text-slate-500 block mb-0.5">Tên người nhận</span>
                                            <input type="text" value={parsedName} onChange={(e) => setParsedName(e.target.value)} className="w-full rounded border p-1" />
                                        </div>
                                        <div>
                                            <span className="text-slate-500 block mb-0.5">SĐT nhận</span>
                                            <input type="text" value={parsedPhone} onChange={(e) => setParsedPhone(e.target.value)} className="w-full rounded border p-1" />
                                        </div>
                                        <div>
                                            <span className="text-slate-500 block mb-0.5">Sản phẩm cần</span>
                                            <input type="text" value={parsedItem} onChange={(e) => setParsedItem(e.target.value)} className="w-full rounded border p-1" />
                                        </div>
                                        <div>
                                            <span className="text-slate-500 block mb-0.5">Địa chỉ nhận</span>
                                            <input type="text" value={parsedAddress} onChange={(e) => setParsedAddress(e.target.value)} className="w-full rounded border p-1" />
                                        </div>
                                    </div>

                                    {(parsedName || parsedPhone || parsedAddress) && (
                                        <button 
                                            onClick={handlePushToPos}
                                            className="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-1 rounded animate-pulse"
                                        >
                                            👉 CHUYỂN TOÀN BỘ THÔNG TIN & ĐỒNG BỘ ĐƠN SANG MÀN HÌNH POS
                                        </button>
                                    )}
                                </div>
                            </div>
                        ) : (
                            <p className="text-center py-16 text-slate-400">Chọn tin nhắn ở bên trái để kích hoạt trợ lý robot AI phân tích.</p>
                        )}
                    </div>
                </div>
            );
        }

                                />
                            </div>
                            <div>
                                <label className="block text-slate-700 font-bold mb-0.5">GHN SHOP ID</label>
                                <input 
                                    type="text"
                                    placeholder="Mã cửa hàng GHN"
                                    value={ghnShopId}
                                    onChange={(e) => setGhnShopId(e.target.value)}
                                    className="w-full rounded border p-1.5 font-mono text-slate-900"
                                />
                            </div>
                        </div>

                        <div>
                            <label className="block text-slate-700 font-bold mb-0.5">SPX EXPRESS / SHOPEE OPEN PLATFORM SECRET KEY</label>
                            <input 
                                type="password"
                                placeholder="Dán mã Secret Key của SPX lấy từ trang hồ sơ shop..."
                                value={spxToken}
                                onChange={(e) => setSpxToken(e.target.value)}
                                className="w-full rounded border p-1.5 font-mono text-slate-900"
                            />
                        </div>

                        <div className="border-t border-dashed pt-2 space-y-2">
                            <span className="font-bold text-slate-700">📍 THÔNG TIN BƯU CỤC GỬI HÀNG (SHOP):</span>
                            <div>
                                <label className="block text-slate-500 mb-0.5">Địa chỉ gửi</label>
                                <input type="text" value={shopAddress} onChange={(e) => setShopAddress(e.target.value)} className="w-full rounded border p-1 text-slate-900 font-medium" />
                            </div>
                            <div>
                                <label className="block text-slate-500 mb-0.5">Số điện thoại gửi</label>
                                <input type="text" value={shopPhone} onChange={(e) => setShopPhone(e.target.value)} className="w-full rounded border p-1 text-slate-900 font-medium" />
                            </div>
                        </div>

                        <button type="submit" className="w-full bg-slate-900 hover:bg-slate-950 text-white font-bold py-1.5 rounded text-xs shadow">Lưu toàn bộ thiết lập</button>
                    </form>

                    <div className="border-t border-red-200 pt-3 mt-1.5 space-y-1">
                        <span className="font-bold text-red-700 block">DỌN DẸP HỆ THỐNG / RESET DATABASE:</span>
                        <p className="text-[10px] text-slate-500">Mọi hành động ở đây sẽ tác động trực tiếp và ghi đè toàn bộ dữ liệu lưu trữ LocalStorage.</p>
                        <div className="flex gap-2">
                            <button onClick={() => askConfirm("CẢNH BÁO", "Bạn có chắc chắn muốn xóa sạch hoàn toàn cơ sở dữ liệu về trắng 0? (Dữ liệu cũ sẽ được lưu vết trong Thùng Rác)", () => resetDatabase("empty"))} className="bg-red-100 hover:bg-red-200 text-red-700 font-bold py-1 px-3 rounded">Xóa toàn bộ dữ liệu</button>
                            <button onClick={() => setShowTrashModal(true)} className="bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold py-1 px-3 rounded flex items-center gap-1">
                                <i className="fa-solid fa-trash-can-arrow-up"></i> Xem Lịch sử khôi phục ({trashBin.length})
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<App />);
    </script>
</body>
</html>
