<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LinhKienPRO - Hệ Thống Quản Trị Bán Hàng & Kết Nối API Vận Chuyển</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontSize: {
                        'xxs': '10px',
                        'xs': '11px',
                        'sm': '12px',
                        'base': '13px',
                    }
                }
            }
        }
    </script>
    <!-- Google Fonts & FontAwesome -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f1f5f9;
            -webkit-tap-highlight-color: transparent;
        }
        /* Scrollbar compact */
        ::-webkit-scrollbar {
            width: 4px;
            height: 4px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f5f9;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }
        .active-tab {
            background-color: #e2e8f0;
            color: #0f172a;
            border-left: 3px solid #3b82f6;
        }
    </style>
</head>
<body class="overflow-x-hidden antialiased">
    <div id="root"></div>

    <!-- React, ReactDOM & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Crypto JS for HMAC calculations -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // --- CORE LOCAL STORAGE WRAPPERS ---
        const getLocalStorage = (key, initialValue) => {
            const saved = localStorage.getItem(key);
            if (saved) {
                try { return JSON.parse(saved); } catch(e) { console.error(e); }
            }
            return initialValue;
        };

        const setLocalStorage = (key, value) => {
            localStorage.setItem(key, JSON.stringify(value));
        };

        const DEFAULT_PRODUCTS = [
            { id: "SP001", name: "Màn hình iPhone 11 Pro Max Zin", category: "Màn hình", costPrice: 1200000, sellPrice: 1750000, stock: 15, unit: "Cái" },
            { id: "SP002", name: "Pin dung lượng cao iPhone 12 Pro", category: "Pin", costPrice: 250000, sellPrice: 480000, stock: 45, unit: "Cục" },
            { id: "SP003", name: "Kính lưng sau iPhone 13 Pro Max", category: "Kính lưng", costPrice: 80000, sellPrice: 220000, stock: 8, unit: "Miếng" },
            { id: "SP004", name: "Cáp sạc nhanh Type-C to Lightning 20W", category: "Phụ kiện", costPrice: 45000, sellPrice: 120000, stock: 120, unit: "Sợi" },
            { id: "SP005", name: "Cụm camera sau iPhone 11", category: "Camera", costPrice: 450000, sellPrice: 700000, stock: 2, unit: "Cụm" }
        ];

        const DEFAULT_CUSTOMERS = [
            { id: "KH001", name: "Anh Minh Hoàng", phone: "0901234567", address: "123 Lê Lợi, Phường Bến Thành, Quận 1, TP. HCM", debt: 0, notes: "Khách VIP mua nhiều" },
            { id: "KH002", name: "Chị Thảo Apple", phone: "0987654321", address: "45/12 Xô Viết Nghệ Tĩnh, Quận Bình Thạnh, TP. HCM", debt: 450000, notes: "Chuyên sỉ màn hình" },
            { id: "KH003", name: "Cửa hàng Linh Kiện Sài Gòn", phone: "0911223344", address: "789 Hùng Vương, Quận 5, TP. HCM", debt: 2100000, notes: "Giao nhận xe khách hoặc ship GHN COD" }
        ];

        const DEFAULT_ORDERS = [
            { id: "HD1001", date: "2026-05-25 14:32", customerId: "KH001", customerName: "Anh Minh Hoàng", items: [{productId: "SP001", name: "Màn hình iPhone 11 Pro Max Zin", quantity: 1, price: 1750000, cost: 1200000}], total: 1750000, discount: 50000, finalTotal: 1700000, profit: 500000, paymentMethod: "Tiền mặt", status: "Thành công" },
            { id: "HD1002", date: "2026-05-26 09:15", customerId: "KH002", customerName: "Chị Thảo Apple", items: [{productId: "SP002", name: "Pin dung lượng cao iPhone 12 Pro", quantity: 2, price: 480000, cost: 250000}], total: 960000, discount: 0, finalTotal: 960000, profit: 460000, paymentMethod: "Chuyển khoản", status: "Thành công" }
        ];

        const DEFAULT_SHIPPINGS = [
            { id: "SH1001", orderId: "HD1001", carrier: "SPX", trackingCode: "SPX-VN-9821873", receiverName: "Anh Minh Hoàng", receiverPhone: "0901234567", receiverAddress: "123 Lê Lợi, Phường Bến Thành, Quận 1, TP. HCM", codAmount: 0, shippingFee: 30000, status: "Đã giao hàng" }
        ];

        const DEFAULT_MESSAGES = [
            { id: 1, sender: "Chị Thảo Apple", text: "Alo shop ơi, có màn hình iPhone 11 Pro Max Zin không? Với lại lấy thêm 2 pin 12 Pro nữa nha. Ship về: 45/12 Xô Viết Nghệ Tĩnh, Bình Thạnh, SĐT: 0987654321 nhé!", time: "21:45" },
            { id: 2, sender: "Khách Vãng Lai", text: "Pin iPhone 12 Pro giá lẻ nhiêu shop? Có ship nhanh nội thành không ạ?", time: "21:50" }
        ];

        const DEFAULT_CONFIGS = {
            geminiApiKey: "",
            ghnToken: "",
            ghnShopId: "",
            spxToken: "",
            shopAddress: "321 Ba Tháng Hai, Quận 10, TP. Hồ Chí Minh",
            shopPhone: "0909999888"
        };

        const fetchGeminiAPI = async (payload, apiKey) => {
            const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent?key=${apiKey}`;
            const response = await fetch(apiUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            if (response.ok) {
                return await response.json();
            }
            throw new Error(`Gemini API Error (HTTP ${response.status})`);
        };

        function App() {
            // State chính
            const [activeTab, setActiveTab] = useState("dashboard");
            const [products, setProducts] = useState(() => getLocalStorage("lk_products", DEFAULT_PRODUCTS));
            const [customers, setCustomers] = useState(() => getLocalStorage("lk_customers", DEFAULT_CUSTOMERS));
            const [orders, setOrders] = useState(() => getLocalStorage("lk_orders", DEFAULT_ORDERS));
            const [shippings, setShippings] = useState(() => getLocalStorage("lk_shippings", DEFAULT_SHIPPINGS));
            const [messages, setMessages] = useState(() => getLocalStorage("lk_messages", DEFAULT_MESSAGES));
            const [configs, setConfigs] = useState(() => getLocalStorage("lk_configs", DEFAULT_CONFIGS));
            
            // THÙNG RÁC HỆ THỐNG - LƯU TRỮ LỊCH SỬ DỮ LIỆU VỪA XÓA THẬT
            const [trashBin, setTrashBin] = useState(() => getLocalStorage("lk_trash_bin", []));

            // State chuyển giao thông tin AI từ tab Messenger sang POS
            const [aiOrderDraft, setAiOrderDraft] = useState(null);

            // UI states
            const [sidebarOpen, setSidebarOpen] = useState(false);
            const [showPwaModal, setShowPwaModal] = useState(false);
            const [showTrashModal, setShowTrashModal] = useState(false);
            const [toast, setToast] = useState({ show: false, message: "", type: "success" });

            // CUSTOM DIALOG MODALS STATES
            const [confirmModal, setConfirmModal] = useState({ show: false, title: "", message: "", onConfirm: null });
            const [promptModal, setPromptModal] = useState({ show: false, title: "", message: "", defaultValue: "", onConfirm: null, value: "" });
            const [copyModal, setCopyModal] = useState({ show: false, title: "", content: "" });

            // Toast helper
            const showToast = (message, type = "success") => {
                setToast({ show: true, message, type });
                setTimeout(() => setToast({ show: false, message: "", type: "success" }), 3000);
            };

            // Sync database LocalStorage
            useEffect(() => { setLocalStorage("lk_products", products); }, [products]);
            useEffect(() => { setLocalStorage("lk_customers", customers); }, [customers]);
            useEffect(() => { setLocalStorage("lk_orders", orders); }, [orders]);
            useEffect(() => { setLocalStorage("lk_shippings", shippings); }, [shippings]);
            useEffect(() => { setLocalStorage("lk_messages", messages); }, [messages]);
            useEffect(() => { setLocalStorage("lk_configs", configs); }, [configs]);
            useEffect(() => { setLocalStorage("lk_trash_bin", trashBin); }, [trashBin]);

            // Custom Dialog Triggers
            const askConfirm = (title, message, callback) => {
                setConfirmModal({ show: true, title, message, onConfirm: () => { callback(); setConfirmModal({ show: false }); } });
            };

            const askPrompt = (title, message, defaultValue, callback) => {
                setPromptModal({ show: true, title, message, defaultValue, value: defaultValue, onConfirm: (val) => { callback(val); setPromptModal({ show: false }); } });
            };

            const openCopyModal = (title, content) => {
                setCopyModal({ show: true, title, content });
            };

            const handleCopyToClipboard = (text) => {
                const textArea = document.createElement("textarea");
                textArea.value = text;
                document.body.appendChild(textArea);
                textArea.select();
                try {
                    document.execCommand('copy');
                    showToast("Đã sao chép văn bản vào khay nhớ tạm!", "success");
                } catch (err) {
                    showToast("Không thể tự động sao chép.", "error");
                }
                document.body.removeChild(textArea);
            };

            // Reset/Wipe Database Helper (Sửa đổi: Chỉ xóa sạch, loại bỏ nạp dữ liệu mẫu khỏi đây)
            const resetDatabase = (type) => {
                if (type === "empty") {
                    // Backup dữ liệu hiện tại vào Thùng rác trước khi xóa trắng
                    const backupItems = [];
                    products.forEach(p => backupItems.push({ deleteId: Date.now() + Math.random(), type: "Sản phẩm", date: new Date().toLocaleString(), originalData: p }));
                    customers.forEach(c => backupItems.push({ deleteId: Date.now() + Math.random(), type: "Khách hàng", date: new Date().toLocaleString(), originalData: c }));
                    orders.forEach(o => backupItems.push({ deleteId: Date.now() + Math.random(), type: "Đơn hàng", date: new Date().toLocaleString(), originalData: o }));
                    
                    if (backupItems.length > 0) {
                        setTrashBin(prev => [...prev, ...backupItems]);
                    }

                    setProducts([]);
                    setCustomers([]);
                    setOrders([]);
                    setShippings([]);
                    setMessages([]);
                    showToast("Đã dọn dẹp hệ thống về trắng! Dữ liệu cũ đã được sao lưu vào Thùng Rác.", "success");
                }
            };

            // Hàm lưu vết thùng rác khi xóa lẻ tẻ
            const deleteToTrash = (type, originalData) => {
                const trashItem = {
                    deleteId: Date.now() + Math.random(),
                    type: type, // "Sản phẩm", "Khách hàng", "Đơn hàng"
                    date: new Date().toLocaleDateString() + " " + new Date().toLocaleTimeString().substring(0, 5),
                    originalData: originalData
                };
                setTrashBin(prev => [...prev, trashItem]);
            };

            // Khôi phục một mục cụ thể từ Thùng rác
            const restoreFromTrash = (item) => {
                const data = item.originalData;
                if (item.type === "Sản phẩm") {
                    if (products.some(p => p.id === data.id)) {
                        showToast(`Sản phẩm với mã SKU ${data.id} đã tồn tại trong kho hiện tại!`, "error");
                        return;
                    }
                    setProducts(prev => [...prev, data]);
                } else if (item.type === "Khách hàng") {
                    if (customers.some(c => c.id === data.id)) {
                        showToast(`Khách hàng với mã ${data.id} đã tồn tại!`, "error");
                        return;
                    }
                    setCustomers(prev => [...prev, data]);
                } else if (item.type === "Đơn hàng") {
                    if (orders.some(o => o.id === data.id)) {
                        showToast(`Hóa đơn với mã ${data.id} đã tồn tại!`, "error");
                        return;
                    }
                    setOrders(prev => [...prev, data]);
                }
                setTrashBin(prev => prev.filter(t => t.deleteId !== item.deleteId));
                showToast(`Đã khôi phục thành công ${item.type}: ${data.name || data.id}!`, "success");
            };

            const handleCopyLink = () => {
                const currentUrl = window.location.href;
                navigator.clipboard.writeText(currentUrl).then(() => {
                    showToast("Đã copy liên kết ứng dụng!", "success");
                }).catch(() => {
                    handleCopyToClipboard(currentUrl);
                });
            };

            return (
                <div className="flex h-screen overflow-hidden bg-slate-100 text-slate-800 text-xs">
                    {/* Toast */}
                    {toast.show && (
                        <div className="fixed top-4 right-4 z-50 flex items-center gap-2 rounded px-3 py-2 text-white shadow-lg text-xs animate-bounce"
                             style={{ backgroundColor: toast.type === 'error' ? '#ef4444' : '#10b981' }}>
                            <i className={`fas ${toast.type === 'error' ? 'fa-exclamation-circle' : 'fa-check-circle'}`}></i>
                            <span>{toast.message}</span>
                        </div>
                    )}

                    {/* CONFIRM MODAL */}
                    {confirmModal.show && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center bg-black bg-opacity-50 p-3">
                            <div className="w-full max-w-xs rounded-lg bg-white p-4 shadow-2xl border border-slate-200 animate-fade-in">
                                <h4 className="font-bold text-slate-900 text-xs border-b pb-1.5 flex items-center gap-1.5 uppercase">
                                    <i className="fa-solid fa-circle-question text-blue-500"></i> {confirmModal.title}
                                </h4>
                                <p className="text-slate-600 my-3 text-xxs leading-normal">{confirmModal.message}</p>
                                <div className="flex justify-end gap-2 border-t pt-2.5">
                                    <button 
                                        onClick={() => setConfirmModal({ show: false })}
                                        className="rounded bg-slate-100 hover:bg-slate-200 px-3 py-1 text-slate-600 font-semibold text-xxs"
                                    >
                                        Hủy bỏ
                                    </button>
                                    <button 
                                        onClick={confirmModal.onConfirm}
                                        className="rounded bg-red-600 hover:bg-red-700 px-3 py-1 text-white font-bold text-xxs"
                                    >
                                        Đồng ý
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* PROMPT MODAL */}
                    {promptModal.show && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center bg-black bg-opacity-50 p-3">
                            <div className="w-full max-w-xs rounded-lg bg-white p-4 shadow-2xl border border-slate-200">
                                <h4 className="font-bold text-slate-900 text-xs border-b pb-1.5 flex items-center gap-1.5 uppercase">
                                    <i className="fa-solid fa-pen-to-square text-emerald-500"></i> {promptModal.title}
                                </h4>
                                <p className="text-slate-600 mt-2 mb-1.5 text-xxs">{promptModal.message}</p>
                                <input 
                                    type="text"
                                    value={promptModal.value}
                                    onChange={(e) => setPromptModal({ ...promptModal, value: e.target.value })}
                                    className="w-full rounded border border-slate-300 p-1.5 font-bold text-slate-900 focus:outline-none focus:border-emerald-500 text-xs"
                                />
                                <div className="flex justify-end gap-2 border-t pt-2.5 mt-3">
                                    <button 
                                        onClick={() => setPromptModal({ show: false })}
                                        className="rounded bg-slate-100 hover:bg-slate-200 px-3 py-1 text-slate-600 font-semibold text-xxs"
                                    >
                                        Hủy
                                    </button>
                                    <button 
                                        onClick={() => promptModal.onConfirm(promptModal.value)}
                                        className="rounded bg-emerald-600 hover:bg-emerald-700 px-3 py-1 text-white font-bold text-xxs"
                                    >
                                        Xác nhận
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* COPY & VIEW MODAL FOR AI DRAFTS */}
                    {copyModal.show && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center bg-black bg-opacity-50 p-3">
                            <div className="w-full max-w-sm rounded-lg bg-white p-4 shadow-2xl border border-slate-200 text-xxs">
                                <h4 className="font-bold text-slate-900 text-xs border-b pb-1.5 flex items-center gap-1.5 uppercase">
                                    <i className="fa-solid fa-wand-magic-sparkles text-indigo-500 animate-pulse"></i> {copyModal.title}
                                </h4>
                                <div className="my-3 bg-slate-50 p-2.5 border rounded text-slate-700 leading-relaxed max-h-52 overflow-y-auto font-medium whitespace-pre-wrap">
                                    {copyModal.content}
                                </div>
                                <div className="flex justify-end gap-2 border-t pt-2.5">
                                    <button 
                                        onClick={() => setCopyModal({ show: false })}
                                        className="rounded bg-slate-100 hover:bg-slate-200 px-3 py-1.5 text-slate-600 font-semibold"
                                    >
                                        Đóng
                                    </button>
                                    <button 
                                        onClick={() => handleCopyToClipboard(copyModal.content)}
                                        className="rounded bg-indigo-600 hover:bg-indigo-700 px-3 py-1.5 text-white font-bold flex items-center gap-1"
                                    >
                                        <i className="fa-regular fa-copy"></i> Sao chép
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* THÙNG RÁC MODAL (Lịch sử đã xóa lưu vết thực tế) */}
                    {showTrashModal && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center bg-black bg-opacity-60 p-3">
                            <div className="w-full max-w-md rounded-lg bg-white p-4 shadow-2xl border border-slate-200 flex flex-col max-h-[85vh]">
                                <h3 className="font-bold text-slate-900 text-sm border-b pb-2 flex items-center justify-between">
                                    <span className="flex items-center gap-1.5 text-red-600">
                                        <i className="fa-solid fa-trash-can-arrow-up"></i> THÙNG RÁC & LỊCH SỬ KHÔI PHỤC HỆ THỐNG
                                    </span>
                                    <button onClick={() => setShowTrashModal(false)} className="text-slate-400 hover:text-slate-600">
                                        <i className="fa-solid fa-xmark text-sm"></i>
                                    </button>
                                </h3>
                                
                                <div className="flex-1 overflow-y-auto my-3 space-y-2 pr-1">
                                    {trashBin.length === 0 ? (
                                        <div className="py-12 text-center text-slate-400 space-y-2">
                                            <i className="fa-regular fa-folder-open text-3xl block"></i>
                                            <p className="text-xxs">Thùng rác trống! Chưa có dữ liệu hàng hóa hay khách hàng nào bị xóa gần đây.</p>
                                        </div>
                                    ) : (
                                        trashBin.map(item => (
                                            <div key={item.deleteId} className="flex justify-between items-center bg-slate-50 border p-2 rounded text-xxs">
                                                <div>
                                                    <span className={`px-1.5 py-0.5 rounded text-[9px] font-bold uppercase mr-1.5 ${item.type === 'Sản phẩm' ? 'bg-blue-100 text-blue-700' : item.type === 'Khách hàng' ? 'bg-emerald-100 text-emerald-700' : 'bg-orange-100 text-orange-700'}`}>
                                                        {item.type}
                                                    </span>
                                                    <span className="font-bold text-slate-800">
                                                        {item.originalData.name || item.originalData.id} 
                                                        {item.originalData.sellPrice ? ` - ${item.originalData.sellPrice.toLocaleString()}đ` : ''}
                                                    </span>
                                                    <p className="text-[10px] text-slate-400 mt-0.5">Xóa lúc: {item.date}</p>
                                                </div>
                                                <div className="flex gap-1">
                                                    <button 
                                                        onClick={() => restoreFromTrash(item)}
                                                        className="bg-emerald-600 hover:bg-emerald-700 text-white font-bold px-2 py-1 rounded text-[10px]"
                                                    >
                                                        Khôi phục
                                                    </button>
                                                    <button 
                                                        onClick={() => setTrashBin(prev => prev.filter(t => t.deleteId !== item.deleteId))}
                                                        className="bg-slate-200 hover:bg-red-100 hover:text-red-700 text-slate-600 font-bold px-2 py-1 rounded text-[10px]"
                                                        title="Xóa vĩnh viễn"
                                                    >
                                                        Xóa
                                                    </button>
                                                </div>
                                            </div>
                                        ))
                                    )}
                                </div>
                                <div className="flex justify-between border-t pt-2.5">
                                    <button 
                                        onClick={() => { if(window.confirm("Dọn sạch thùng rác vĩnh viễn?")) setTrashBin([]); }}
                                        disabled={trashBin.length === 0}
                                        className="rounded bg-red-100 hover:bg-red-200 text-red-700 font-bold px-3 py-1.5 text-xxs disabled:opacity-50"
                                    >
                                        Dọn sạch thùng rác
                                    </button>
                                    <button 
                                        onClick={() => setShowTrashModal(false)}
                                        className="rounded bg-slate-900 hover:bg-slate-950 text-white font-bold px-4 py-1.5 text-xxs"
                                    >
                                        Đóng cửa sổ
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Left Sidebar */}
                    <div className={`fixed inset-y-0 left-0 z-40 w-52 transform bg-slate-900 text-slate-300 transition-transform duration-200 ease-in-out md:static md:translate-x-0 ${sidebarOpen ? 'translate-x-0' : '-translate-x-full'}`}>
                        <div className="flex h-11 items-center justify-between border-b border-slate-800 px-3 bg-slate-950">
                            <span className="flex items-center gap-1.5 font-bold text-white text-sm">
                                <i className="fa-solid fa-microchip text-blue-400"></i>
                                LINHKIEN<span className="text-blue-500">PRO</span>
                            </span>
                            <button onClick={() => setSidebarOpen(false)} className="text-slate-400 hover:text-white md:hidden">
                                <i className="fa-solid fa-xmark text-sm"></i>
                            </button>
                        </div>

                        {/* Menu */}
                        <nav className="flex-1 space-y-0.5 px-1 py-2">
                            <button onClick={() => { setActiveTab("dashboard"); setSidebarOpen(false); }} className={`flex w-full items-center gap-2 rounded px-2.5 py-1.5 transition-colors ${activeTab === 'dashboard' ? 'active-tab' : 'hover:bg-slate-800 hover:text-white'}`}>
                                <i className="fa-solid fa-chart-pie w-4"></i> Tổng quan (Dashboard)
                            </button>
                            <button onClick={() => { setActiveTab("pos"); setSidebarOpen(false); }} className={`flex w-full items-center gap-2 rounded px-2.5 py-1.5 transition-colors ${activeTab === 'pos' ? 'active-tab' : 'hover:bg-slate-800 hover:text-white'}`}>

        // ==========================================
        // TAB 1: DASHBOARD (TỔNG QUAN & AI APP MANAGER)
        // ==========================================
        function DashboardTab({ products, setProducts, customers, setCustomers, orders, setOrders, shippings, configs, showToast, askConfirm, resetDatabase, setShowTrashModal, trashBin }) {
            const [aiAdvice, setAiAdvice] = useState(() => getLocalStorage("lk_ai_advice", "Chưa có lời khuyên tài chính nào từ trợ lý AI. Vui lòng cấu hình Gemini API Key và bấm 'Yêu cầu AI phân tích' phía dưới để tiến hành rà soát."));
            const [loadingAI, setLoadingAI] = useState(false);

            // STATE CHO TRỢ LÝ TOÀN NĂNG AI (APP MANAGER)
            const [aiCommand, setAiCommand] = useState("");
            const [aiLogs, setAiLogs] = useState([]);
            const [pendingAction, setPendingAction] = useState(null); // Lưu trữ lệnh chưa xác nhận (do thiếu thông tin)
            const [loadingCmd, setLoadingCmd] = useState(false);

            const stats = useMemo(() => {
                let revenue = 0;
                let cost = 0;
                let profit = 0;
                orders.forEach(o => {
                    if (o.status === "Thành công") {
                        revenue += o.finalTotal;
                        profit += o.profit;
                        o.items.forEach(i => { cost += (i.cost * i.quantity); });
                    }
                });

                const totalInStock = products.reduce((acc, p) => acc + p.stock, 0);
                const lowStockCount = products.filter(p => p.stock < 5).length;
                const totalDebt = customers.reduce((acc, c) => acc + c.debt, 0);

                return { revenue, cost, profit, totalInStock, lowStockCount, totalDebt };
            }, [products, customers, orders]);

            const triggerGeminiDashboard = async () => {
                if (!configs.geminiApiKey) {
                    showToast("Vui lòng vào tab 'Cấu hình kết nối API' điền Gemini API Key để rà soát!", "error");
                    return;
                }
                setLoadingAI(true);
                try {
                    const prompt = `Dựa trên dữ liệu tài chính của cửa hàng linh kiện điện thoại LinhKienPRO:
                    - Doanh thu thực tế: ${stats.revenue.toLocaleString()} VNĐ.
                    - Lợi nhuận gộp: ${stats.profit.toLocaleString()} VNĐ.
                    - Tổng linh kiện tồn kho: ${stats.totalInStock} sản phẩm.
                    - Số loại linh kiện tồn kho ở mức thấp cảnh báo (<5 cái): ${stats.lowStockCount} loại.
                    - Tổng công nợ thu hồi từ đối tác: ${stats.totalDebt.toLocaleString()} VNĐ.
                    
                    Hãy viết 3 phân tích tài chính/hành động thật cụ thể giúp nâng cao tối đa dòng tiền. Viết dưới dạng Markdown danh sách gọn gàng.`;

                    const payload = { contents: [{ parts: [{ text: prompt }] }] };
                    const data = await fetchGeminiAPI(payload, configs.geminiApiKey);
                    const text = data.candidates?.[0]?.content?.parts?.[0]?.text || "Không có phản hồi từ AI.";
                    setAiAdvice(text);
                    setLocalStorage("lk_ai_advice", text);
                    showToast("Đã phân tích xong báo cáo tài chính bằng AI!", "success");
                } catch (e) {
                    showToast("Không kết nối được Gemini API. Vui lòng rà soát lại kết nối mạng.", "error");
                } finally {
                    setLoadingAI(false);
                }
            };

            const handleExecuteAICommand = async (e) => {
                e.preventDefault();
                if (!aiCommand.trim()) return;
                if (!configs.geminiApiKey) {
                    showToast("Vui lòng điền Gemini API Key tại tab 'Cấu hình kết nối API' để sử dụng siêu trợ lý AI!", "error");
                    return;
                }

                setLoadingCmd(true);
                const userMsg = aiCommand.trim();
                setAiCommand("");
                setAiLogs(prev => [...prev, { sender: "user", text: userMsg }]);

                try {
                    const existingProductsText = products.map(p => `SKU: ${p.id}, Tên: ${p.name}, Giá vốn: ${p.costPrice}đ, Giá bán: ${p.sellPrice}đ, Tồn: ${p.stock}, Đơn vị: ${p.unit}, Danh mục: ${p.category}`).join("\n");
                    const prompt = `Bạn là Trợ lý Quản trị Hệ thống Siêu Việt của ứng dụng LinhKienPRO. Nhiệm vụ của bạn là đọc và phân tích câu lệnh tự nhiên từ admin, đối chiếu với dữ liệu kho hiện có, và trả về cấu trúc hành động tương ứng.

                    Danh sách kho linh kiện hiện tại:
                    ${existingProductsText}

                    Câu lệnh từ admin: "${userMsg}"

                    Yêu cầu:
                    Phân tích xem câu lệnh có thuộc các hành động sau:
                    1. "ADD_PRODUCT" (Thêm sản phẩm mới)
                    2. "UPDATE_STOCK" (Tăng/giảm hoặc sửa số lượng tồn kho)
                    3. "NONE" (Chỉ là câu nói giao tiếp hoặc hành động không hỗ trợ)

                    Bạn BẮT BUỘC phải phản hồi bằng một chuỗi JSON duy nhất, dạng phẳng như sau:
                    {
                      "action": "ADD_PRODUCT" hoặc "UPDATE_STOCK" hoặc "NONE",
                      "data": {
                         "id": "Mã SKU tự sinh tăng dần như SP006, SP007... nếu là sản phẩm mới",
                         "name": "Tên linh kiện chuẩn hóa",
                         "category": "Danh mục (chọn 1 trong: Màn hình, Pin, Kính lưng, Phụ kiện, Camera, Dụng cụ)",
                         "costPrice": "Giá vốn dạng số, để null nếu không được nhắc đến",
                         "sellPrice": "Giá bán dạng số, để null nếu không được nhắc đến",
                         "stock": "Số lượng tồn kho ban đầu dạng số, để null nếu không được nhắc đến",
                         "unit": "Đơn vị tính (Cái, Cục, Sợi...) hoặc mặc định 'Cái'"
                      },
                      "missingFields": ["costPrice", "category", etc...], // Mảng danh sách các trường thuộc tính còn thiếu cốt lõi để tạo sản phẩm mà admin không nói trong câu lệnh
                      "message": "Lời phản hồi/câu hỏi khéo léo của bạn gửi lại cho admin. Ví dụ: 'Tôi đã chuẩn bị thêm mặt hàng Vỏ iPhone 11 với giá bán 150,000đ. Tuy nhiên, thông tin còn thiếu giá vốn nhập kho và danh mục. Bạn muốn thiết lập thế nào?'"
                    }`;

                    const payload = {
                        contents: [{ parts: [{ text: prompt }] }],
                        generationConfig: { responseMimeType: "application/json" }
                    };

                    const response = await fetchGeminiAPI(payload, configs.geminiApiKey);
                    const jsonText = response.candidates?.[0]?.content?.parts?.[0]?.text;
                    const result = JSON.parse(jsonText);

                    if (result.action === "NONE") {
                        setAiLogs(prev => [...prev, { sender: "ai", text: result.message || "Tôi không hiểu rõ yêu cầu quản trị này. Bạn có thể thử các câu lệnh như: 'Thêm linh kiện vỏ ip 11 giá bán 150k vào kho'" }]);
                    } else if (result.action === "ADD_PRODUCT") {
                        // Lưu vết hành động chờ xác nhận
                        setPendingAction({
                            type: "ADD_PRODUCT",
                            missingFields: result.missingFields || [],
                            data: {
                                id: result.data.id || "SP" + (1000 + products.length + 1),
                                name: result.data.name || "",
                                category: result.data.category || "Kính lưng",
                                costPrice: result.data.costPrice || "",
                                sellPrice: result.data.sellPrice || "",
                                stock: result.data.stock || 1,
                                unit: result.data.unit || "Cái"
                            }
                        });
                        setAiLogs(prev => [...prev, { sender: "ai", text: result.message }]);
                    } else if (result.action === "UPDATE_STOCK") {
                        // Sửa số lượng kho hàng trực tiếp từ AI
                        const skuMatch = userMsg.match(/SP\d+/i);
                        let matchedProd = null;
                        if (skuMatch) {
                            matchedProd = products.find(p => p.id.toUpperCase() === skuMatch[0].toUpperCase());
                        } else {
                            // Tìm theo tên tương đồng
                            matchedProd = products.find(p => p.name.toLowerCase().includes(result.data.name.toLowerCase()));
                        }

                        if (matchedProd) {
                            let changeStock = result.data.stock || 1;
                            // Check xem là tăng hay giảm
                            const isSubtract = userMsg.includes("giảm") || userMsg.includes("bớt") || userMsg.includes("-");
                            const newStock = isSubtract ? Math.max(0, matchedProd.stock - changeStock) : (matchedProd.stock + changeStock);
                            
                            setProducts(prev => prev.map(p => p.id === matchedProd.id ? { ...p, stock: newStock } : p));
                            setAiLogs(prev => [...prev, { sender: "ai", text: `Đã cập nhật số lượng của linh kiện [${matchedProd.id}] ${matchedProd.name} từ ${matchedProd.stock} thành ${newStock}!` }]);
                            showToast("Đã điều chỉnh kho hàng qua AI!", "success");
                        } else {
                            setAiLogs(prev => [...prev, { sender: "ai", text: `Tôi không tìm thấy mã linh kiện phù hợp với tên '${result.data.name}' để cập nhật tồn kho.` }]);
                        }
                    }
                } catch (e) {
                    setAiLogs(prev => [...prev, { sender: "ai", text: "Gặp lỗi xử lý câu lệnh. Vui lòng kiểm tra lại API Key hoặc mạng kết nối." }]);
                } finally {
                    setLoadingCmd(false);
                }
            };

            // Thực thi lưu nháp đề xuất của AI sau khi admin hoàn tất điền form bổ sung
            const handleConfirmPendingAction = (e) => {
                e.preventDefault();
                if (!pendingAction) return;

                const finalData = {
                    id: pendingAction.data.id,
                    name: pendingAction.data.name,
                    category: pendingAction.data.category,
                    costPrice: Number(pendingAction.data.costPrice || 0),
                    sellPrice: Number(pendingAction.data.sellPrice || 0),
                    stock: Number(pendingAction.data.stock || 1),
                    unit: pendingAction.data.unit
                };

                if (!finalData.name || finalData.costPrice <= 0 || finalData.sellPrice <= 0) {
                    showToast("Vui lòng điền đúng và đủ thông tin giá cả trước khi lưu!", "error");
                    return;
                }

                if (products.some(p => p.id === finalData.id)) {
                    showToast("Mã SKU đã trùng lặp trong hệ thống!", "error");
                    return;
                }

                setProducts(prev => [...prev, finalData]);
                setAiLogs(prev => [...prev, { sender: "ai", text: `Thành công: Đã lưu linh kiện mới [${finalData.id}] ${finalData.name} vào cơ sở dữ liệu kho hàng!` }]);
                setPendingAction(null);
                showToast("Đã thêm hàng mới vào kho từ AI!", "success");
            };

            return (
                <div className="space-y-3">
                    {/* Thẻ nhanh */}
                    <div className="grid grid-cols-2 gap-2 sm:grid-cols-4">
                        <div className="rounded bg-white p-2 md:p-3 shadow-sm border border-slate-200">
                            <span className="text-slate-500 font-medium text-xxs uppercase">Doanh thu thực</span>
                            <p className="mt-0.5 font-bold text-slate-900 text-sm md:text-base">{stats.revenue.toLocaleString()}đ</p>

        // ==========================================
        // TAB 2: POS BÁN HÀNG (TẠO HÓA ĐƠN & VẬN ĐƠN)
        // ==========================================
        function POSTab({ products, setProducts, customers, setCustomers, orders, setOrders, shippings, setShippings, configs, showToast, aiOrderDraft, setAiOrderDraft }) {
            const [cart, setCart] = useState([]);
            const [selectedCustomer, setSelectedCustomer] = useState(null);
            const [discount, setDiscount] = useState(0);
            const [paymentMethod, setPaymentMethod] = useState("Tiền mặt");
            const [searchProduct, setSearchProduct] = useState("");
            const [searchCustomer, setSearchCustomer] = useState("");
            const [posCategory, setPosCategory] = useState("Tất cả");

            // Shipping state
            const [isShipping, setIsShipping] = useState(false);
            const [carrier, setCarrier] = useState("SPX");
            const [shippingFee, setShippingFee] = useState(30000);
            const [codAmount, setCodAmount] = useState(0);
            const [receiverName, setReceiverName] = useState("");
            const [receiverPhone, setReceiverPhone] = useState("");
            const [receiverAddress, setReceiverAddress] = useState("");
            const [shippingNote, setShippingNote] = useState("");

            // Quick customer modal
            const [showAddCustomerModal, setShowAddCustomerModal] = useState(false);
            const [quickCustName, setQuickCustName] = useState("");
            const [quickCustPhone, setQuickCustPhone] = useState("");
            const [quickCustAddr, setQuickCustAddr] = useState("");

            // Preview modal
            const [createdInvoice, setCreatedInvoice] = useState(null);

            // Ghi nhận bản nháp đơn hàng chuyển giao từ AI Messenger sang POS
            useEffect(() => {
                if (aiOrderDraft) {
                    setReceiverName(aiOrderDraft.name || "");
                    setReceiverPhone(aiOrderDraft.phone || "");
                    setReceiverAddress(aiOrderDraft.address || "");
                    setIsShipping(true);

                    // Tìm khách hàng tương đồng để chọn luôn
                    const matched = customers.find(c => c.phone === aiOrderDraft.phone);
                    if (matched) {
                        setSelectedCustomer(matched);
                    } else if (aiOrderDraft.name) {
                        // Thêm nhanh khách hàng mới
                        const newCust = {
                            id: "KH" + (1001 + customers.length),
                            name: aiOrderDraft.name,
                            phone: aiOrderDraft.phone || "0900000000",
                            address: aiOrderDraft.address || "Chưa có địa chỉ",
                            debt: 0,
                            notes: "Tự động tạo từ Messenger AI"
                        };
                        setCustomers(prev => [...prev, newCust]);
                        setSelectedCustomer(newCust);
                    }

                    // Tự động tìm kiếm linh kiện khớp để add vào giỏ hàng
                    if (aiOrderDraft.requestedItem) {
                        const matchedProd = products.find(p => p.name.toLowerCase().includes(aiOrderDraft.requestedItem.toLowerCase()));
                        if (matchedProd) {
                            addToCart(matchedProd);
                        }
                    }

                    // Reset nháp tránh vòng lặp
                    setAiOrderDraft(null);
                    showToast("Đã tải xong thông tin khách hàng từ AI sang POS!", "success");
                }
            }, [aiOrderDraft]);

            // Trích lọc kho linh kiện POS
            const categories = ["Tất cả", "Màn hình", "Pin", "Kính lưng", "Phụ kiện", "Camera"];
            const filteredProducts = useMemo(() => {
                return products.filter(p => {
                    const matchSearch = p.name.toLowerCase().includes(searchProduct.toLowerCase()) || p.id.toLowerCase().includes(searchProduct.toLowerCase());
                    const matchCat = posCategory === "Tất cả" || p.category === posCategory;
                    return matchSearch && matchCat;
                });
            }, [products, searchProduct, posCategory]);

            const filteredCustomers = customers.filter(c => 
                c.name.toLowerCase().includes(searchCustomer.toLowerCase()) || c.phone.includes(searchCustomer)
            );

            const addToCart = (product) => {
                if (product.stock <= 0) {
                    showToast(`Linh kiện [${product.name}] đã hết hàng!`, "error");
                    return;
                }
                setCart(prevCart => {
                    const exist = prevCart.find(i => i.productId === product.id);
                    if (exist) {
                        if (exist.quantity >= product.stock) {
                            showToast(`Sản phẩm này chỉ còn tồn tối đa: ${product.stock}!`, "error");
                            return prevCart;
                        }
                        return prevCart.map(i => i.productId === product.id ? { ...i, quantity: i.quantity + 1 } : i);
                    } else {
                        return [...prevCart, { productId: product.id, name: product.name, price: product.sellPrice, cost: product.costPrice, quantity: 1 }];
                    }
                });
                showToast(`Đã thêm ${product.name}`);
            };

            const updateCartQuantity = (productId, val) => {
                const prod = products.find(p => p.id === productId);
                setCart(prevCart => prevCart.map(i => {
                    if (i.productId === productId) {
                        const nextVal = i.quantity + val;
                        if (nextVal <= 0) return null;
                        if (nextVal > prod.stock) {
                            showToast(`Vượt quá số lượng tồn tối đa (${prod.stock})!`, "error");
                            return i;
                        }
                        return { ...i, quantity: nextVal };
                    }
                    return i;
                }).filter(Boolean));
            };

            const handleUpdateCartPrice = (productId, newPrice) => {
                setCart(prevCart => prevCart.map(i => i.productId === productId ? { ...i, price: Number(newPrice) } : i));
            };

            const handleSelectCustomer = (c) => {
                setSelectedCustomer(c);
                setReceiverName(c.name);
                setReceiverPhone(c.phone);
                setReceiverAddress(c.address);
                setSearchCustomer("");
            };

            const handleQuickAddCustomer = (e) => {
                e.preventDefault();
                if (!quickCustName || !quickCustPhone) {
                    showToast("Điền tên và sđt để thêm nhanh!", "error");
                    return;
                }
                const newC = {
                    id: "KH" + (1001 + customers.length),
                    name: quickCustName,
                    phone: quickCustPhone,
                    address: quickCustAddr,
                    debt: 0,
                    notes: "Tạo trực tiếp tại POS"
                };
                setCustomers([...customers, newC]);
                setSelectedCustomer(newC);
                setReceiverName(quickCustName);
                setReceiverPhone(quickCustPhone);
                setReceiverAddress(quickCustAddr);
                
                setQuickCustName("");
                setQuickCustPhone("");
                setQuickCustAddr("");
                setShowAddCustomerModal(false);
                showToast("Đã tạo nhanh khách hàng!", "success");
            };

            const cartTotal = cart.reduce((sum, i) => sum + (i.price * i.quantity), 0);
            const finalTotal = Math.max(0, cartTotal - discount);
            const cartCost = cart.reduce((sum, i) => sum + (i.cost * i.quantity), 0);
            const profit = Math.max(0, finalTotal - cartCost);

            useEffect(() => {
                if (isShipping) {
                    setCodAmount(finalTotal);
                }
            }, [finalTotal, isShipping]);

            const handleCheckout = () => {
                if (cart.length === 0) {
                    showToast("Chọn linh kiện để xuất hóa đơn!", "error");
                    return;
                }

                const orderId = "HD" + (1001 + orders.length);
                const orderDate = new Date().toISOString().replace('T', ' ').substring(0, 16);

                const newOrder = {
                    id: orderId,
                    date: orderDate,
                    customerId: selectedCustomer ? selectedCustomer.id : "KH_LE",
                    customerName: selectedCustomer ? selectedCustomer.name : "Khách bán lẻ tại quầy",
                    items: cart,
                    total: cartTotal,
                    discount: discount,
                    finalTotal: finalTotal,
                    profit: profit,
                    paymentMethod: paymentMethod,
                    status: "Thành công"
                };

                const updatedProducts = products.map(p => {
                    const cartItem = cart.find(it => it.productId === p.id);
                    if (cartItem) {
                        return { ...p, stock: p.stock - cartItem.quantity };
                    }
                    return p;
                });
                setProducts(updatedProducts);
                setOrders([...orders, newOrder]);

                let newShipping = null;
                if (isShipping) {
                    const shippingId = "SH" + (1001 + shippings.length);
                    const randomTracking = `${carrier}-VN-${Math.floor(1000000 + Math.random() * 9000000)}`;

                    newShipping = {
                        id: shippingId,
                        orderId: orderId,
                        carrier: carrier,
                        trackingCode: randomTracking,
                        receiverName: receiverName || "Khách hàng lẻ",
                        receiverPhone: receiverPhone || "0900000000",
                        receiverAddress: receiverAddress || "Lấy trực tiếp",
                        codAmount: Number(codAmount),
                        shippingFee: Number(shippingFee),
                        status: "Chờ lấy hàng",
                        notes: shippingNote
                    };
                    setShippings([...shippings, newShipping]);
                }

                setCreatedInvoice({ order: newOrder, shipping: newShipping });
                showToast("Khởi tạo đơn hàng & Vận đơn hoàn tất!", "success");
            };

            const resetPOS = () => {
                setCart([]);
                setSelectedCustomer(null);
                setDiscount(0);
                setIsShipping(false);
                setReceiverName("");
                setReceiverPhone("");
                setReceiverAddress("");
                setCodAmount(0);
                setShippingNote("");
            };

            return (
                <div className="grid grid-cols-1 lg:grid-cols-12 gap-3 h-full">
                    {/* Left: Product Selector */}
                    <div className="lg:col-span-7 bg-white p-2.5 rounded border border-slate-200 flex flex-col overflow-hidden">
                        
                        {/* Categories Tab selector */}
                        <div className="flex gap-1 overflow-x-auto pb-2 border-b border-slate-100 mb-2">
                            {categories.map(c => (
                                <button 
                                    key={c}
                                    onClick={() => setPosCategory(c)}
                                    className={`px-2.5 py-1 rounded text-[10px] font-bold ${posCategory === c ? 'bg-slate-900 text-white' : 'bg-slate-100 text-slate-600 hover:bg-slate-200'}`}
                                >
                                    {c}
                                </button>
                            ))}
                        </div>

                        <div className="relative mb-2">
                            <i className="fa-solid fa-magnifying-glass absolute left-2 top-2 text-slate-400"></i>
                            <input 
                                type="text"
                                placeholder="Tìm mã SKU hoặc tên linh kiện..."
                                value={searchProduct}
                                onChange={(e) => setSearchProduct(e.target.value)}

                    {/* Print Preview Modal */}
                    {createdInvoice && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center bg-black bg-opacity-65 p-3 overflow-y-auto">

        // ==========================================
        // TAB 3: KHO LINH KIỆN (THÊM, SỬA, XÓA LƯU VẾT)
        // ==========================================
        function ProductsTab({ products, setProducts, configs, showToast, askConfirm, deleteToTrash }) {
            const [search, setSearch] = useState("");
            const [filterCat, setFilterCat] = useState("Tất cả");
            const [editingProduct, setEditingProduct] = useState(null);

            // Form state
            const [id, setId] = useState("");
            const [name, setName] = useState("");
            const [category, setCategory] = useState("Màn hình");
            const [costPrice, setCostPrice] = useState(0);
            const [sellPrice, setSellPrice] = useState(0);
            const [stock, setStock] = useState(0);
            const [unit, setUnit] = useState("Cái");

            const categories = ["Tất cả", "Màn hình", "Pin", "Kính lưng", "Phụ kiện", "Camera", "Dụng cụ"];

            const filtered = products.filter(p => {
                const matchSearch = p.name.toLowerCase().includes(search.toLowerCase()) || p.id.toLowerCase().includes(search.toLowerCase());
                const matchCat = filterCat === "Tất cả" || p.category === filterCat;
                return matchSearch && matchCat;
            });

            const handleSave = (e) => {
                e.preventDefault();
                if (!id || !name || costPrice <= 0 || sellPrice <= 0) {
                    showToast("Vui lòng nhập đầy đủ giá và thông tin linh kiện!", "error");
                    return;
                }

                const updated = {
                    id: id.trim().toUpperCase(),
                    name: name.trim(),
                    category,
                    costPrice: Number(costPrice),
                    sellPrice: Number(sellPrice),
                    stock: Number(stock),
                    unit
                };

                if (editingProduct) {
                    setProducts(prev => prev.map(p => p.id === editingProduct.id ? updated : p));
                    showToast(`Đã lưu thay đổi linh kiện: ${name}`);
                } else {
                    if (products.some(p => p.id === updated.id)) {
                        showToast("Mã SKU này đã tồn tại trong hệ thống!", "error");
                        return;
                    }
                    setProducts(prev => [...prev, updated]);
                    showToast(`Đã thêm linh kiện: ${name}`);
                }

                resetForm();
            };

            const handleEdit = (p) => {
                setEditingProduct(p);
                setId(p.id);
                setName(p.name);
                setCategory(p.category);
                setCostPrice(p.costPrice);
                setSellPrice(p.sellPrice);
                setStock(p.stock);
                setUnit(p.unit);
            };

            const handleDelete = (prodId) => {
                const target = products.find(p => p.id === prodId);
                askConfirm(
                    "XÁC NHẬN XÓA",
                    `Bạn có chắc chắn muốn xóa linh kiện mã [${prodId}] khỏi kho? Sản phẩm này sẽ được đưa vào Thùng Rác để khôi phục khi cần.`,
                    () => {
                        if (target) deleteToTrash("Sản phẩm", target);
                        setProducts(prev => prev.filter(p => p.id !== prodId));
                        showToast("Đã xóa linh kiện (Chuyển vào Thùng Rác)!");
                    }
                );
            };

            const resetForm = () => {
                setEditingProduct(null);
                setId("");
                setName("");
                setCategory("Màn hình");
                setCostPrice(0);
                setSellPrice(0);
                setStock(0);
                setUnit("Cái");
            };

            return (
                <div className="grid grid-cols-1 lg:grid-cols-12 gap-3">
                    {/* Form Editor */}
                    <div className="lg:col-span-4 bg-white p-2.5 rounded border border-slate-200 text-xxs flex flex-col gap-3">
                        <div>
                            <h3 className="font-bold text-slate-950 mb-2 border-b pb-1 flex justify-between items-center text-xs">
                                <span>{editingProduct ? "✍️ CẬP NHẬT LINH KIỆN" : "➕ THÊM LINH KIỆN MỚI"}</span>
                                {editingProduct && <button onClick={resetForm} className="text-red-500 font-bold hover:underline">Hủy sửa</button>}
                            </h3>

                            <form onSubmit={handleSave} className="space-y-2">
                                <div className="grid grid-cols-2 gap-2">
                                    <div>
                                        <label className="block text-slate-500 mb-0.5">Mã SKU linh kiện *</label>
                                        <input 
                                            type="text"
                                            required
                                            disabled={!!editingProduct}
                                            value={id}
                                            onChange={(e) => setId(e.target.value)}
                                            className="w-full rounded border border-slate-300 p-1 uppercase font-bold disabled:bg-slate-50"
                                            placeholder="Ví dụ: SP001"
                                        />
                                    </div>
                                    <div>
                                        <label className="block text-slate-500 mb-0.5">Phân loại danh mục</label>
                                        <select 
                                            value={category}
                                            onChange={(e) => setCategory(e.target.value)}
                                            className="w-full rounded border border-slate-300 p-1"
                                        >
                                            <option value="Màn hình">Màn hình</option>
                                            <option value="Pin">Pin điện thoại</option>
                                            <option value="Kính lưng">Kính lưng/Vỏ sau</option>
                                            <option value="Phụ kiện">Phụ kiện/Cáp</option>
                                            <option value="Camera">Camera sau/trước</option>

            const [search, setSearch] = useState("");
            const [editingCust, setEditingCust] = useState(null);

            // Form state
            const [name, setName] = useState("");
            const [phone, setPhone] = useState("");
            const [address, setAddress] = useState("");
            const [debt, setDebt] = useState(0);
            const [notes, setNotes] = useState("");

            // View state
            const [selectedCustomerHistory, setSelectedCustomerHistory] = useState(null);

            const filtered = customers.filter(c => 
                c.name.toLowerCase().includes(search.toLowerCase()) || c.phone.includes(search)
            );

            const handleDraftAIDebtReminder = async (cust) => {
                if (!configs.geminiApiKey) {
                    showToast("Điền Gemini API Key ở tab Cấu hình trước!", "error");
                    return;
                }
                showToast("Trợ lý AI đang soạn thảo mẫu nhắc nợ tinh tế...", "info");

                try {
                    const prompt = `Soạn một mẫu tin nhắn Zalo/SMS nhắc nhở công nợ cực kỳ khéo léo, thân thiện nhưng vẫn trang trọng và rõ ràng cho khách hàng tên "${cust.name}" đang có công nợ trị giá ${cust.debt.toLocaleString()} VNĐ tại cửa hàng LinhKienPRO.`;
                    const payload = { contents: [{ parts: [{ text: prompt }] }] };

                    const resultData = await fetchGeminiAPI(payload, configs.geminiApiKey);
                    const responseText = resultData.candidates?.[0]?.content?.parts?.[0]?.text || "Không soạn thảo được.";
                    
                    openCopyModal(`Soạn tin nhắn nhắc nợ (AI) - ${cust.name}`, responseText);
                } catch (e) {
                    showToast("Không tạo được bản nháp bằng AI.", "error");
                }
            };

            const handleSave = (e) => {
                e.preventDefault();
                if (!name || !phone) {
                    showToast("Điền đầy đủ tên và sđt!", "error");
                    return;
                }

                const updated = {
                    id: editingCust ? editingCust.id : "KH" + (1001 + customers.length),
                    name: name.trim(),
                    phone: phone.trim(),
                    address: address.trim(),
                    debt: Number(debt),
                    notes: notes.trim()

                if (editingCust) {
                    setCustomers(prev => prev.map(c => c.id === editingCust.id ? updated : c));
                    showToast("Đã lưu chỉnh sửa đối tác!");

                    setCustomers(prev => [...prev, updated]);
                    showToast("Đã thêm khách hàng mới thành công!");

                resetForm();

            const handleEdit = (c) => {
                setEditingCust(c);
                setName(c.name);
                setPhone(c.phone);
                setAddress(c.address);
                setDebt(c.debt);
                setNotes(c.notes);

            const handleDelete = (id) => {
                const target = customers.find(c => c.id === id);

                    "XÁC NHẬN XÓA KHÁCH HÀNG",
                    "Bạn có thật sự muốn xóa hồ sơ khách hàng này? Hồ sơ sẽ được chuyển vào Thùng Rác để có thể khôi phục.",
                    () => {
                        if (target) deleteToTrash("Khách hàng", target);
                        setCustomers(prev => prev.filter(c => c.id !== id));
                        showToast("Đã xóa hồ sơ khách (Chuyển vào Thùng Rác)!");
                    }
                );
            };

            const handlePayDebt = (cId) => {
                askPrompt(
                    "THU NỢ KHÁCH HÀNG",
                    "Vui lòng nhập chính xác số tiền cần thu nợ để trừ vào công nợ hiện tại:",
                    "0",

                        const payAmt = Number(amount);
                        if (isNaN(payAmt) || payAmt <= 0) {
                            showToast("Số tiền thu nợ không hợp lệ!", "error");
                            return;
                        }

                        setCustomers(prev => prev.map(c => {
                            if (c.id === cId) {
                                const newDebt = Math.max(0, c.debt - payAmt);
                                showToast(`Đã thu ${payAmt.toLocaleString()}đ. Công nợ còn lại: ${newDebt.toLocaleString()}đ`, "success");
                                return { ...c, debt: newDebt };
                            }
                            return c;
                        }));
                    }
                );
            };

            const resetForm = () => {
                setEditingCust(null);
                setName("");
                setPhone("");
                setAddress("");
                setDebt(0);
                setNotes("");
            };

            return (
                <div className="grid grid-cols-1 lg:grid-cols-12 gap-3 text-xxs">
                    {/* Form Editor */}
                    <div className="lg:col-span-4 bg-white p-2.5 rounded border border-slate-200">
                        <h3 className="font-bold text-slate-950 mb-2 border-b pb-1 flex justify-between items-center text-xs">
                            <span>{editingCust ? "👤 CẬP NHẬT ĐỐI TÁC" : "👤 THÊM ĐỐI TÁC KHÁCH HÀNG"}</span>
                            {editingCust && <button onClick={resetForm} className="text-red-500 font-bold hover:underline">Hủy sửa</button>}
                        </h3>

                        <form onSubmit={handleSave} className="space-y-2">
                            <div>
                                <label className="block text-slate-500 mb-0.5">Họ tên đối tác *</label>
                                <input type="text" required value={name} onChange={(e) => setName(e.target.value)} className="w-full rounded border border-slate-300 p-1" />
                            </div>
                            <div>
                                <label className="block text-slate-500 mb-0.5">Số điện thoại liên lạc *</label>
                                <input type="text" required value={phone} onChange={(e) => setPhone(e.target.value)} className="w-full rounded border border-slate-300 p-1" />
                            </div>
                            <div>
                                <label className="block text-slate-500 mb-0.5">Địa chỉ đầy đủ</label>
                                <input type="text" value={address} onChange={(e) => setAddress(e.target.value)} className="w-full rounded border border-slate-300 p-1" />
                            </div>
                            <div className="grid grid-cols-2 gap-2">
                                <div>
                                    <label className="block text-slate-500 mb-0.5">Dư nợ ban đầu (đ)</label>
                                    <input type="number" value={debt} onChange={(e) => setDebt(Number(e.target.value))} className="w-full rounded border border-slate-300 p-1 font-bold text-red-500" />
                                </div>
                                <div>
                                    <label className="block text-slate-500 mb-0.5">Mô tả ghi chú</label>
                                    <input type="text" value={notes} onChange={(e) => setNotes(e.target.value)} className="w-full rounded border border-slate-300 p-1" />
                                </div>
                            </div>
                            <button type="submit" className="w-full bg-slate-900 hover:bg-slate-950 text-white font-bold py-1.5 rounded mt-3">Lưu hồ sơ đối tác</button>
                        </form>
                    </div>

                    {/* Database List */}
                    <div className="lg:col-span-8 bg-white p-2.5 rounded border border-slate-200">
                        <div className="flex justify-between items-center mb-3">
                            <h3 className="font-bold text-slate-900 text-xxs uppercase">👥 DANH SÁCH KHÁCH HÀNG THÂN THIẾT</h3>
                            <input 
                                type="text"
                                placeholder="Lọc tên, sđt..."
                                value={search}
                                onChange={(e) => setSearch(e.target.value)}
                                className="rounded border border-slate-300 px-2 py-0.5 text-xxs w-36"
                            />
                        </div>

                        <div className="overflow-x-auto">
                            <table className="w-full text-left">
                                <thead>
                                    <tr className="bg-slate-100 text-slate-500 uppercase text-[9px]">
                                        <th className="p-1.5">Mã KH</th>
                                        <th className="p-1.5">Họ tên</th>
                                        <th className="p-1.5">Số điện thoại</th>
                                        <th className="p-1.5 text-right">Nợ hiện tại</th>
                                        <th className="p-1.5 text-center">Thao tác</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-slate-100">
                                    {filtered.map(c => (
                                        <tr key={c.id} className="hover:bg-slate-50/50">
                                            <td className="p-1.5 font-bold text-slate-700">{c.id}</td>
                                            <td className="p-1.5 font-semibold text-slate-900">{c.name}</td>
                                            <td className="p-1.5">{c.phone}</td>
                                            <td className={`p-1.5 text-right font-bold ${c.debt > 0 ? 'text-red-500' : 'text-slate-500'}`}>{c.debt.toLocaleString()}đ</td>
                                            <td className="p-1.5 text-center flex items-center justify-center gap-2">
                                                {c.debt > 0 && (
                                                    <button 
                                                        onClick={() => handleDraftAIDebtReminder(c)} 
                                                        className="bg-indigo-100 hover:bg-indigo-200 text-indigo-800 font-bold px-1.5 py-0.5 rounded"
                                                        title="Soạn tin nhắc nợ"
                                                    >
                                                        <i className="fa-solid fa-wand-magic-sparkles"></i> 🤖 Nhắc nợ
                                                    </button>
                                                )}
                                                <button onClick={() => handlePayDebt(c.id)} className="bg-emerald-100 hover:bg-emerald-200 text-emerald-800 font-bold px-1.5 py-0.2 rounded" title="Thu nợ">Thu Nợ</button>
                                                <button onClick={() => setSelectedCustomerHistory(c)} className="text-slate-600 hover:text-slate-800"><i className="fa-solid fa-clock-rotate-left"></i></button>
                                                <button onClick={() => handleEdit(c)} className="text-blue-500 hover:text-blue-700"><i className="fa-regular fa-pen-to-square"></i></button>
                                                <button onClick={() => handleDelete(c.id)} className="text-red-500 hover:text-red-700"><i className="fa-regular fa-trash-can"></i></button>
                                            </td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </div>

                    {/* Customer history details modal */}
                    {selectedCustomerHistory && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center bg-black bg-opacity-50 p-3">

                                        <div key={o.id} className="p-1.5 bg-slate-50 border border-slate-100 rounded flex justify-between items-center">

                                        </div>

        // ==========================================
        // TAB 5: LỊCH SỬ ĐƠN HÀNG (SỬA, HOÀN KHO LƯU VẾT)
        // ==========================================
        function OrdersTab({ orders, setOrders, shippings, setShippings, products, setProducts, showToast, askConfirm, deleteToTrash }) {
            const [search, setSearch] = useState("");

            const filtered = orders.filter(o => 
                o.id.toLowerCase().includes(search.toLowerCase()) || o.customerName.toLowerCase().includes(search.toLowerCase())
            );

            const handleDeleteOrder = (orderId) => {
                const target = orders.find(o => o.id === orderId);
                askConfirm(
                    "XÁC NHẬN HỦY ĐƠN HÀNG",
                    `Bạn có thật sự muốn hủy đơn hàng ${orderId} này? Các mặt hàng sẽ được cộng trả lại vào kho hàng. Bản ghi đơn hàng này sẽ được đưa vào Thùng Rác.`,
                    () => {
                        if (target) {
                            deleteToTrash("Đơn hàng", target);
                            
                            // Hoàn kho
                            const restoredProducts = products.map(p => {
                                const orderItem = target.items.find(it => it.productId === p.id);
                                if (orderItem) {
                                    return { ...p, stock: p.stock + orderItem.quantity };
                                }
                                return p;
                            });
                            setProducts(restoredProducts);
                        }

                        setOrders(prev => prev.filter(o => o.id !== orderId));
                        setShippings(prev => prev.filter(s => s.orderId !== orderId));
                        showToast(`Đã hủy hoàn tất đơn hàng ${orderId} & chuyển vào Thùng Rác!`, "success");
                    }
                );
            };

            return (
                <div className="bg-white p-2.5 rounded border border-slate-200 text-xxs">
                    <div className="flex justify-between items-center mb-3">
                        <h3 className="font-bold text-slate-900 uppercase">📝 NHẬT KÝ ĐƠN HÀNG HOÀN THÀNH</h3>
                        <input 
                            type="text"
                            placeholder="Lọc mã đơn, tên..."
                            value={search}
                            onChange={(e) => setSearch(e.target.value)}
                            className="rounded border border-slate-300 px-2 py-0.5 text-xxs w-36"
                        />
                    </div>

                    <div className="overflow-x-auto">
                        <table className="w-full text-left">
                            <thead>
                                <tr className="bg-slate-100 text-slate-500 uppercase text-[9px]">
                                    <th className="p-1.5">Mã đơn</th>
                                    <th className="p-1.5">Ngày xuất</th>
                                    <th className="p-1.5">Họ tên khách</th>
                                    <th className="p-1.5 text-right">Tổng tiền</th>
                                    <th className="p-1.5 text-right">Lợi nhuận</th>
                                    <th className="p-1.5">Thanh toán</th>
                                    <th className="p-1.5 text-center">Thao tác</th>
                                </tr>
                            </thead>
                            <tbody className="divide-y divide-slate-100">
                                {filtered.map(o => (
                                    <tr key={o.id} className="hover:bg-slate-50/50">
                                        <td className="p-1.5 font-bold text-slate-700">{o.id}</td>
                                        <td className="p-1.5 text-slate-500">{o.date}</td>
                                        <td className="p-1.5 font-semibold">{o.customerName}</td>
                                        <td className="p-1.5 text-right font-bold text-slate-900">{o.finalTotal.toLocaleString()}đ</td>
                                        <td className="p-1.5 text-right font-bold text-emerald-600">+{o.profit.toLocaleString()}đ</td>
                                        <td className="p-1.5">{o.paymentMethod}</td>
                                        <td className="p-1.5 text-center">
                                            <button 
                                                onClick={() => handleDeleteOrder(o.id)}
                                                className="bg-red-100 hover:bg-red-200 text-red-700 font-bold px-2 py-0.5 rounded text-[10px]"
                                            >
                                                HỦY & HOÀN KHO

                                    </tr>
                                )}

                        </table>
                    </div>

            );
